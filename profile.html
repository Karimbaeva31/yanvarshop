<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет - Январь</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-container { max-width: 800px; margin: 30px auto; }
        .profile-card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .profile-avatar { width: 80px; height: 80px; background: #2ecc71; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .profile-avatar i { font-size: 40px; color: white; }
        .profile-name { font-size: 22px; font-weight: bold; }
        .profile-email { color: #666; margin-top: 5px; }
        .profile-section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .profile-section h3 { margin-bottom: 15px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        .save-btn { background: #2ecc71; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .save-btn:hover { background: #27ae60; }
        .orders-list { margin-top: 20px; }
        .order-card { border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: box-shadow 0.3s; }
        .order-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; }
        .status-new { background: #3498db; }
        .status-processing { background: #f39c12; }
        .status-shipped { background: #2ecc71; }
        .status-delivered { background: #27ae60; }
        .status-cancelled { background: #e74c3c; }
        .order-details { color: #666; font-size: 14px; line-height: 1.8; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #3498db; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .admin-link { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; text-align: center; }
        .admin-link a { background: #3498db; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; }
        .admin-link a:hover { background: #2980b9; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #2ecc71; color: white; border-radius: 8px; z-index: 10000; animation: slideIn 0.3s ease-out; }
        .notification.error { background: #e74c3c; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo"><h1><a href="index.html" style="color: #2ecc71; text-decoration: none;">Январь</a></h1></div>
                <div class="user-actions">
                    <a href="catalog.html" style="color: #3498db; text-decoration: none; margin-right: 15px;"><i class="fas fa-shopping-bag"></i> Каталог</a>
                    <a href="cart.html" class="cart-btn"><i class="fas fa-shopping-cart"></i><span id="cart-count" class="cart-count">0</span></a>
                    <div id="auth-buttons"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        
        <div class="profile-container">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar"><i class="fas fa-user"></i></div>
                    <div class="profile-name" id="profile-name">Загрузка...</div>
                    <div class="profile-email" id="profile-email">-</div>
                </div>
                
                <div class="profile-section">
                    <h3><i class="fas fa-user-edit"></i> Личные данные</h3>
                    <form id="profile-form">
                        <div class="form-group"><label>ФИО *</label><input type="text" id="fullname" required></div>
                        <div class="form-group"><label>Телефон</label><input type="tel" id="phone" placeholder="+7 (___) ___-__-__"></div>
                        <div class="form-group"><label>Адрес доставки (только г. Самара)</label><textarea id="address" rows="3" placeholder="г. Самара, ул. Ленина, д. 10"></textarea></div>
                        <button type="submit" class="save-btn"><i class="fas fa-save"></i> Сохранить изменения</button>
                    </form>
                </div>
                
                <div class="profile-section">
                    <h3><i class="fas fa-clipboard-list"></i> Мои заказы</h3>
                    <div id="orders-list" class="orders-list">Загрузка заказов...</div>
                </div>
                
                <div id="admin-link-container" class="admin-link" style="display: none;">
                    <a href="admin.html"><i class="fas fa-shield-alt"></i> Админ панель</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        function showNotification(message, type = 'success') {
            const oldNotification = document.querySelector('.notification');
            if (oldNotification) oldNotification.remove();
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'error' ? 'error' : ''}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        async function loadProfile() {
            if (!api.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const response = await fetch('http://localhost:3000/auth/profile', {
                    headers: { 'Authorization': `Bearer ${api.token}` }
                });
                const user = await response.json();
                document.getElementById('profile-name').textContent = user.fullname;
                document.getElementById('profile-email').textContent = user.email;
                document.getElementById('fullname').value = user.fullname;
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('address').value = user.address || '';
                
                // Показываем админ-ссылку если роль 1
                const token = localStorage.getItem('token');
                if (token) {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.roleid === 1) {
                        document.getElementById('admin-link-container').style.display = 'block';
                    }
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showNotification('Ошибка загрузки профиля', 'error');
            }
        }
        
        async function loadOrders() {
            try {
                const response = await fetch('http://localhost:3000/orders', {
                    headers: { 'Authorization': `Bearer ${api.token}` }
                });
                const orders = await response.json();
                const ordersList = document.getElementById('orders-list');
                
                if (!orders || orders.length === 0) {
                    ordersList.innerHTML = '<p>У вас пока нет заказов</p><a href="catalog.html" class="save-btn" style="display: inline-block; margin-top: 15px;">Перейти в каталог</a>';
                    return;
                }
                
                // Фильтруем заказы с суммой > 0
                const validOrders = orders.filter(order => order.total > 0);
                
                if (validOrders.length === 0) {
                    ordersList.innerHTML = '<p>У вас пока нет подтвержденных заказов</p><a href="catalog.html" class="save-btn" style="display: inline-block; margin-top: 15px;">Перейти в каталог</a>';
                    return;
                }
                
                ordersList.innerHTML = validOrders.map(order => {
                    const statusRu = { 
                        'new': '🆕 Новый', 
                        'processing': '⚙️ В обработке', 
                        'shipped': '📦 Отправлен', 
                        'delivered': '✅ Доставлен', 
                        'cancelled': '❌ Отменен' 
                    }[order.status] || order.status;
                    
                    let orderDate = 'Дата неизвестна';
                    if (order.created_at && order.created_at !== '0000-00-00 00:00:00') {
                        const date = new Date(order.created_at);
                        if (!isNaN(date.getTime())) {
                            orderDate = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
                        }
                    }
                    
                    return `
                        <div class="order-card" onclick="window.location.href='order-details.html?id=${order.orderid}'">
                            <div class="order-header">
                                <strong>📋 Заказ #${order.orderid}</strong>
                                <span class="status-badge status-${order.status}">${statusRu}</span>
                            </div>
                            <div class="order-details">
                                <div>📅 ${orderDate}</div>
                                <div>💰 Сумма: <strong>${parseFloat(order.total).toFixed(2)} ₽</strong></div>
                                <div>🚚 Адрес: ${order.address || 'Не указан'}</div>
                                <div>💳 Оплата: ${order.payment_method || '-'}</div>
                                ${order.comment ? `<div>📝 Комментарий: ${order.comment}</div>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
                document.getElementById('orders-list').innerHTML = '<p>Ошибка загрузки заказов</p><button onclick="loadOrders()" style="margin-top:10px;padding:5px 10px;background:#3498db;color:white;border:none;border-radius:5px;">Повторить</button>';
            }
        }
        
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            
            try {
                const response = await fetch('http://localhost:3000/auth/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${api.token}` },
                    body: JSON.stringify({ fullname, phone, address })
                });
                
                if (response.ok) {
                    showNotification('✅ Профиль обновлен!');
                    loadProfile();
                } else {
                    showNotification('❌ Ошибка обновления', 'error');
                }
            } catch (error) {
                showNotification('❌ Ошибка: ' + error.message, 'error');
            }
        });
        
        async function updateCartCount() {
            const cartCount = document.getElementById('cart-count');
            if (cartCount && api.isAuthenticated()) {
                try {
                    const cart = await api.getCart();
                    const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                    cartCount.textContent = total;
                } catch(e) {
                    cartCount.textContent = '0';
                }
            } else {
                cartCount.textContent = '0';
            }
        }
        
        function checkAuth() {
            const authButtons = document.getElementById('auth-buttons');
            if (api.isAuthenticated()) {
                authButtons.innerHTML = `<button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Выйти</button>`;
            } else {
                authButtons.innerHTML = `<a href="login.html" style="color: #3498db; text-decoration: none;">Войти</a>`;
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('cartCount');
            window.location.href = 'index.html';
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            loadOrders();
            checkAuth();
            updateCartCount();
        });
    </script>
</body>
</html>
