<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заказы - Январь</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .orders-container {
            max-width: 1000px;
            margin: 30px auto;
        }
        
        .orders-header {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .orders-list {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .order-card {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
        }
        
        .order-card:hover {
            background: #fafafa;
        }
        
        .order-card:last-child {
            border-bottom: none;
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .order-id {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        
        .order-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-new { background: #3498db; color: white; }
        .status-processing { background: #f39c12; color: white; }
        .status-shipped { background: #2ecc71; color: white; }
        .status-delivered { background: #27ae60; color: white; }
        .status-cancelled { background: #e74c3c; color: white; }
        
        .order-date {
            color: #7f8c8d;
            font-size: 13px;
        }
        
        .order-details {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        
        .order-details p {
            margin: 8px 0;
            color: #555;
            font-size: 14px;
        }
        
        .order-details strong {
            color: #333;
        }
        
        .order-items {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
        }
        
        .no-orders {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 10px;
        }
        
        .no-orders i {
            font-size: 80px;
            color: #ddd;
            margin-bottom: 20px;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #3498db;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <h1><a href="index.html" style="color: #2ecc71; text-decoration: none;">Январь</a></h1>
                </div>
                <div class="user-actions">
                    <a href="profile.html" style="color: #3498db; text-decoration: none; margin-right: 15px;">
                        <i class="fas fa-user"></i> Личный кабинет
                    </a>
                    <a href="catalog.html" style="color: #3498db; text-decoration: none; margin-right: 15px;">
                        <i class="fas fa-shopping-bag"></i> Каталог
                    </a>
                    <a href="cart.html" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count" class="cart-count">0</span>
                    </a>
                    <div id="auth-buttons"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
        
        <div class="orders-container">
            <div class="orders-header">
                <h1><i class="fas fa-clipboard-list"></i> Мои заказы</h1>
                <p>История ваших покупок</p>
            </div>
            
            <div id="orders-content">
                <div class="no-orders">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p>Загрузка заказов...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        async function loadOrders() {
            const ordersContent = document.getElementById('orders-content');
         
            if (!api.isAuthenticated()) {
                ordersContent.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Требуется авторизация</h2>
                        <p>Для просмотра заказов необходимо войти в систему</p>
                        <a href="login.html" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: #2ecc71; color: white; text-decoration: none; border-radius: 5px;">
                            <i class="fas fa-sign-in-alt"></i> Войти
                        </a>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch('http://localhost:3000/orders', {
                    headers: {
                        'Authorization': `Bearer ${api.token}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Ошибка сервера: ' + response.status);
                }
                
                const orders = await response.json();
                
                console.log("📦 Получены заказы:", orders);
                
                if (!orders || orders.length === 0) {
                    ordersContent.innerHTML = `
                        <div class="no-orders">
                            <i class="fas fa-box-open"></i>
                            <h2>Заказов пока нет</h2>
                            <p>Совершите свой первый заказ</p>
                            <a href="catalog.html" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: #3498db; color: white; text-decoration: none; border-radius: 5px;">
                                <i class="fas fa-arrow-left"></i> Перейти в каталог
                            </a>
                        </div>
                    `;
                    return;
                }
                
                // Фильтруем только заказы с суммой > 0
                const validOrders = orders.filter(order => order.total > 0 && order.orderid);
                
                if (validOrders.length === 0) {
                    ordersContent.innerHTML = `
                        <div class="no-orders">
                            <i class="fas fa-box-open"></i>
                            <h2>Нет подтвержденных заказов</h2>
                            <p>Ваши заказы появятся здесь после оформления</p>
                            <a href="catalog.html" style="display: inline-block; margin-top: 20px; padding: 12px 30px; background: #3498db; color: white; text-decoration: none; border-radius: 5px;">
                                <i class="fas fa-arrow-left"></i> Перейти в каталог
                            </a>
                        </div>
                    `;
                    return;
                }
                
                const statusText = {
                    'new': '🆕 Новый',
                    'processing': '⚙️ В обработке',
                    'shipped': '📦 Отправлен',
                    'delivered': '✅ Доставлен',
                    'cancelled': '❌ Отменен'
                };
                
                ordersContent.innerHTML = `
                    <div class="orders-list">
                        ${validOrders.map(order => {
                            const date = order.created_at ? new Date(order.created_at) : new Date();
                            const status = statusText[order.status] || '🆕 Новый';
                            const statusClass = `status-${order.status || 'new'}`;
                            
                            return `
                                <div class="order-card" onclick="viewOrderDetails(${order.orderid})" style="cursor: pointer;">
                                    <div class="order-header">
                                        <div>
                                            <div class="order-id">📋 Заказ #${order.orderid}</div>
                                            <div class="order-date">📅 ${date.toLocaleDateString('ru-RU')} в ${date.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}</div>
                                        </div>
                                        <div class="order-status ${statusClass}">
                                            ${status}
                                        </div>
                                    </div>
                                    <div class="order-details">
                                        <p>Сумма: <strong>${parseFloat(order.total).toFixed(2)} ₽</strong></p>
                                        <p>🚚 Адрес: ${order.address || 'Не указан'}</p>
                                        <p>💳 Оплата: ${order.payment_method || '-'}</p>
                                        ${order.comment ? `<p>📝 Комментарий: ${order.comment}</p>` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                
            } catch (error) {
                console.error('Ошибка загрузки заказов:', error);
                ordersContent.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Ошибка загрузки</h2>
                        <p>Не удалось загрузить заказы: ${error.message}</p>
                        <button onclick="loadOrders()" style="margin-top: 20px; padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer;">
                            <i class="fas fa-redo"></i> Попробовать снова
                        </button>
                    </div>
                `;
            }
        }
        
        function viewOrderDetails(orderId) {
            window.location.href = `order-details.html?id=${orderId}`;
        }
        
        function checkAuth() {
            const authButtons = document.getElementById('auth-buttons');
            if (!authButtons) return;
            
            if (api.isAuthenticated()) {
                authButtons.innerHTML = `
                    <button onclick="logout()" style="background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">
                        Выйти
                    </button>
                `;
            } else {
                authButtons.innerHTML = `
                    <a href="login.html" style="color: #3498db; text-decoration: none;">
                        <i class="fas fa-user"></i> Войти
                    </a>
                `;
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('cartCount');
            window.location.href = 'index.html';
        }
        
        async function updateCartCount() {
            const cartCount = document.getElementById('cart-count');
            if (!cartCount) return;
            
            if (api.isAuthenticated()) {
                try {
                    const cart = await api.getCart();
                    const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
                    cartCount.textContent = totalItems;
                } catch (error) {
                    cartCount.textContent = '0';
                }
            } else {
                cartCount.textContent = '0';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadOrders();
            checkAuth();
            updateCartCount();
        });
    </script>
</body>
</html>
