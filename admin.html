<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - Январь</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-container { max-width: 1200px; margin: 30px auto; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .stat-card i { font-size: 40px; color: #2ecc71; }
        .stat-card h3 { margin: 10px 0; font-size: 28px; }
        .notifications-list { background: white; border-radius: 10px; overflow: hidden; margin-bottom: 30px; }
        .notification-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.3s; }
        .notification-item:hover { background: #f8f9fa; }
        .notification-item.unread { background: #e8f5e9; border-left: 4px solid #2ecc71; }
        .notification-content { flex: 1; }
        .notification-title { font-weight: bold; margin-bottom: 5px; }
        .notification-date { font-size: 12px; color: #999; }
        .badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
        .orders-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        .orders-table th, .orders-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        .orders-table th { background: #2c3e50; color: white; }
        .status-select { padding: 5px 10px; border-radius: 5px; border: 1px solid #ddd; cursor: pointer; }
        .status-new { background: #3498db; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; display: inline-block; }
        .status-processing { background: #f39c12; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .status-shipped { background: #2ecc71; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .status-delivered { background: #27ae60; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .status-cancelled { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 20px; font-size: 12px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #f8f9fa; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        .tab-btn.active { background: #2ecc71; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .refresh-btn { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        audio { display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo"><h1><a href="index.html" style="color:#2ecc71;text-decoration:none;">Январь - Админ панель</a></h1></div>
                <div class="user-actions">
                    <a href="index.html" style="color:#3498db;text-decoration:none;margin-right:15px;"><i class="fas fa-home"></i> На сайт</a>
                    <div id="auth-buttons"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <div class="admin-container">
            <!-- Звук уведомления -->
            <audio id="notification-sound" preload="auto">
                <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
            </audio>

            <div class="stats" id="stats">
                <div class="stat-card"><i class="fas fa-shopping-cart"></i><h3 id="new-orders">0</h3><p>Новых заказов</p></div>
                <div class="stat-card"><i class="fas fa-bell"></i><h3 id="unread-notif">0</h3><p>Непрочитанных</p></div>
                <div class="stat-card"><i class="fas fa-users"></i><h3 id="total-users">0</h3><p>Пользователей</p></div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('notifications')"><i class="fas fa-bell"></i> Уведомления</button>
                <button class="tab-btn" onclick="showTab('orders')"><i class="fas fa-list"></i> Все заказы</button>
            </div>

            <div id="notifications-tab" class="tab-content active">
                <button class="refresh-btn" onclick="loadNotifications()"><i class="fas fa-sync"></i> Обновить</button>
                <div id="notifications-list" class="notifications-list">Загрузка...</div>
            </div>

            <div id="orders-tab" class="tab-content">
                <button class="refresh-btn" onclick="loadAllOrders()"><i class="fas fa-sync"></i> Обновить</button>
                <div style="overflow-x: auto;">
                    <table class="orders-table" id="orders-table">
                        <thead>
                            <tr><th>ID</th><th>Пользователь</th><th>Сумма</th><th>Статус</th><th>Действие</th></tr>
                        </thead>
                        <tbody id="orders-list">Загрузка...</tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let lastOrderCount = 0;
        
        async function loadNotifications() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }
            
            try {
                const response = await fetch('http://localhost:3000/orders/admin/notifications', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const notifications = await response.json();
                
                const container = document.getElementById('notifications-list');
                const unreadCount = notifications.filter(n => n.status === 'unread').length;
                document.getElementById('unread-notif').textContent = unreadCount;
                
                if (notifications.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; text-align: center;">Нет уведомлений</div>';
                    return;
                }
                
                container.innerHTML = notifications.map(notif => `
                    <div class="notification-item ${notif.status === 'unread' ? 'unread' : ''}" onclick="viewOrder(${notif.order_id})">
                        <div class="notification-content">
                            <div class="notification-title">
                                🔔 <strong>Новый заказ #${notif.order_id}</strong>
                            </div>
                            <div>👤 ${notif.user_name || 'Пользователь'}</div>
                            <div>💰 ${parseFloat(notif.total).toFixed(2)} ₽</div>
                            <div class="notification-date">${new Date(notif.created_at).toLocaleString()}</div>
                        </div>
                        ${notif.status === 'unread' ? '<span class="badge">Новый</span>' : ''}
                    </div>
                `).join('');
                
                // Проверяем новые заказы
                const newOrders = notifications.filter(n => n.status === 'unread').length;
                if (newOrders > lastOrderCount && lastOrderCount !== 0) {
                    document.getElementById('notification-sound').play();
                    showNotification('🔔 Новый заказ!');
                }
                lastOrderCount = newOrders;
                
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        async function loadAllOrders() {
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch('http://localhost:3000/orders/admin/all', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();
                
                document.getElementById('new-orders').textContent = orders.filter(o => o.status === 'new').length;
                document.getElementById('total-users').textContent = [...new Set(orders.map(o => o.userid))].length;
                
                const tbody = document.getElementById('orders-list');
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">Нет заказов</td></tr>';
                    return;
                }
                
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>#${order.idorders}</td>
                        <td>${order.fullname || 'Пользователь'}<br><small>${order.email || '-'}</small></td>
                        <td>${parseFloat(order.total_price).toFixed(2)} ₽</td>
                        <td><span class="status-${order.status}">${getStatusText(order.status)}</span></td>
                        <td>
                            <select class="status-select" onchange="updateStatus(${order.idorders}, this.value)">
                                <option value="new" ${order.status === 'new' ? 'selected' : ''}>🆕 Новый</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>⚙️ В обработке</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>📦 Отправлен</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>✅ Доставлен</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>❌ Отменен</option>
                            </select>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        async function updateStatus(orderId, status) {
            const token = localStorage.getItem('token');
            try {
                await fetch(`http://localhost:3000/orders/${orderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ status })
                });
                showNotification('Статус обновлен');
                loadAllOrders();
                loadNotifications();
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        function viewOrder(orderId) {
            window.location.href = `order-details.html?id=${orderId}`;
        }
        
        function getStatusText(status) {
            const texts = { 'new': 'Новый', 'processing': 'В обработке', 'shipped': 'Отправлен', 'delivered': 'Доставлен', 'cancelled': 'Отменен' };
            return texts[status] || status;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(`${tab}-tab`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'notifications') loadNotifications();
            else loadAllOrders();
        }
        
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        function checkAuth() {
            const authButtons = document.getElementById('auth-buttons');
            const token = localStorage.getItem('token');
            if (token) {
                authButtons.innerHTML = `<button onclick="logout()" style="background:#e74c3c;color:white;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;">Выйти</button>`;
            } else {
                window.location.href = 'login.html';
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
        
        // Автообновление каждые 10 секунд
        setInterval(() => {
            loadNotifications();
            loadAllOrders();
        }, 10000);
        
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadNotifications();
            loadAllOrders();
        });
    </script>
</body>
</html>
