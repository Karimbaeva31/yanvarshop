<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .auth-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
            border-bottom: 3px solid transparent;
        }
        
        .auth-tab.active {
            border-bottom-color: #2ecc71;
            color: #2ecc71;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .auth-button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-button:hover {
            background: #27ae60;
        }
        
        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            padding: 10px;
            background: #ffeaea;
            border-radius: 5px;
            display: none;
        }
        
        .success-message {
            color: #2ecc71;
            margin-top: 10px;
            padding: 10px;
            background: #eaffea;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <h1><a href="index.html" style="color: #2ecc71; text-decoration: none;">Январь</a></h1>
                </div>
                <div class="user-actions">
                    <a href="index.html" style="color: #3498db; text-decoration: none;">
                        <i class="fas fa-home"></i> На главную
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Вход</div>
                <div class="auth-tab" onclick="switchTab('register')">Регистрация</div>
            </div>
            
            <div id="login-form" class="auth-form active">
                <h2 style="margin-bottom: 25px;">Вход в аккаунт</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="ваш@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password" placeholder="Ваш пароль">
                </div>
                <div id="login-error" class="error-message"></div>
                <button class="auth-button" onclick="login()">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </div>
            
            
            <div id="register-form" class="auth-form">
                <h2 style="margin-bottom: 25px;">Регистрация</h2>
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="register-fullname" placeholder="Иванов Иван Иванович">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="ваш@email.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="register-password" placeholder="Не менее 6 символов">
                </div>
                <div class="form-group">
                    <label>Подтвердите пароль</label>
                    <input type="password" id="register-password-confirm" placeholder="Повторите пароль">
                </div>
                <div id="register-error" class="error-message"></div>
                <div id="register-success" class="success-message"></div>
                <button class="auth-button" onclick="register()">
                    <i class="fas fa-user-plus"></i> Зарегистрироваться
                </button>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            document.querySelector(`.auth-tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}-form`).classList.add('active');
        }
        
        async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');
    
    if (!email || !password) {
        errorEl.textContent = 'Заполните все поля';
        errorEl.style.display = 'block';
        return;
    }
    
    try {
        errorEl.style.display = 'none';
        
        const response = await fetch('http://localhost:3000/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const result = await response.json();
        
        if (response.ok && result.token) {
            localStorage.setItem('token', result.token);
            alert('✅ Вход выполнен успешно!');
            window.location.href = 'index.html';
        } else {
            errorEl.textContent = result.message || 'Неверный email или пароль';
            errorEl.style.display = 'block';
        }
    } catch (error) {
        console.error('Ошибка:', error);
        errorEl.textContent = 'Неверный email или пароль. Проверьте правильность ввода.';
        errorEl.style.display = 'block';
    }
}
        
        async function register() {
            const fullname = document.getElementById('register-fullname').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const passwordConfirm = document.getElementById('register-password-confirm').value;
            
            const errorEl = document.getElementById('register-error');
            const successEl = document.getElementById('register-success');
            
            if (!fullname || !email || !password) {
                errorEl.textContent = 'Заполните все обязательные поля';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            
            if (password.length < 6) {
                errorEl.textContent = 'Пароль должен быть не менее 6 символов';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            
            if (password !== passwordConfirm) {
                errorEl.textContent = 'Пароли не совпадают';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            
            try {
                errorEl.style.display = 'none';
                const result = await api.register(fullname, email, password);
                
                if (result.message) {
                    successEl.textContent = result.message;
                    successEl.style.display = 'block';
                    
                    document.getElementById('register-fullname').value = '';
                    document.getElementById('register-email').value = '';
                    document.getElementById('register-password').value = '';
                    document.getElementById('register-password-confirm').value = '';
                    
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-email').value = email;
                        successEl.style.display = 'none';
                    }, 2000);
                } else {
                    errorEl.textContent = result.error || 'Ошибка регистрации';
                    errorEl.style.display = 'block';
                }
            } catch (error) {
                errorEl.textContent = 'Ошибка соединения с сервером';
                errorEl.style.display = 'block';
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (api.isAuthenticated()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
