<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Январь</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-container { max-width: 1000px; margin: 30px auto; }
        .cart-header { background: white; padding: 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .empty-cart { text-align: center; padding: 60px 20px; background: white; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .empty-cart i { font-size: 80px; color: #ddd; margin-bottom: 20px; }
        .cart-items { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .cart-item { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #eee; gap: 15px; flex-wrap: wrap; }
        .cart-item-image { width: 80px; height: 80px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 30px; }
        .cart-item-info { flex: 1; min-width: 150px; }
        .cart-item-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .cart-item-price { color: #2ecc71; font-size: 18px; font-weight: bold; }
        .cart-item-total { font-weight: bold; font-size: 20px; min-width: 100px; text-align: right; color: #2c3e50; }
        .cart-item-remove { color: #e74c3c; cursor: pointer; font-size: 20px; transition: transform 0.3s; }
        .cart-item-remove:hover { transform: scale(1.2); }
        .cart-summary { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .summary-total { font-size: 24px; font-weight: bold; color: #2ecc71; border-bottom: none; }
        .checkout-btn { width: 100%; padding: 16px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; text-align: center; display: inline-block; text-decoration: none; }
        .checkout-btn:hover { background: #27ae60; }
        .clear-cart-btn { width: 100%; padding: 12px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .delivery-info { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; background: #2ecc71; color: white; border-radius: 8px; z-index: 10000; animation: slideIn 0.3s ease-out; max-width: 300px; }
        .notification.error { background: #e74c3c; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo"><h1><a href="index.html" style="color: #2ecc71; text-decoration: none;">Январь</a></h1></div>
                <div class="user-actions">
                    <a href="profile.html" style="color: #3498db; text-decoration: none; margin-right: 15px;"><i class="fas fa-user"></i> Личный кабинет</a>
                    <a href="catalog.html" style="color: #3498db; text-decoration: none; margin-right: 15px;"><i class="fas fa-shopping-bag"></i> Каталог</a>
                    <div id="auth-buttons"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content container">
        <div class="cart-container">
            <div class="cart-header">
                <h1><i class="fas fa-shopping-cart"></i> Корзина покупок</h1>
                <p id="cart-subtitle">Загрузка корзины...</p>
            </div>
            
            <div class="delivery-info">
                <i class="fas fa-truck"></i>
                <strong>Доставка только по городу САМАРА</strong>
            </div>
            
            <div id="cart-content">
                <div class="empty-cart">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p>Загрузка корзины...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let currentCartItems = [];
        
        function showNotification(message, type = 'success') {
            const oldNotification = document.querySelector('.notification');
            if (oldNotification) oldNotification.remove();
            const notification = document.createElement('div');
            notification.className = `notification ${type === 'error' ? 'error' : ''}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        async function loadCart() {
            const cartContent = document.getElementById('cart-content');
            const cartSubtitle = document.getElementById('cart-subtitle');
            
            const token = localStorage.getItem('token');
            if (!token) {
                cartContent.innerHTML = `<div class="empty-cart"><i class="fas fa-exclamation-triangle"></i><h2>Требуется авторизация</h2><a href="login.html" class="checkout-btn" style="display: inline-block; width: auto;">Войти</a></div>`;
                cartSubtitle.textContent = 'Требуется вход';
                return;
            }
            
            try {
                const response = await fetch('http://localhost:3000/cart', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                currentCartItems = await response.json();
                
                if (!currentCartItems || currentCartItems.length === 0) {
                    cartSubtitle.textContent = 'Корзина пуста';
                    cartContent.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-cart"></i><h2>Корзина пуста</h2><a href="catalog.html" class="checkout-btn" style="display: inline-block; width: auto;">Перейти в каталог</a></div>`;
                    return;
                }
                
                cartSubtitle.textContent = `${currentCartItems.length} товаров`;
                displayCartItems(currentCartItems);
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                cartContent.innerHTML = `<div class="empty-cart"><i class="fas fa-exclamation-triangle"></i><p>Ошибка загрузки</p><button onclick="loadCart()">Повторить</button></div>`;
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function displayCartItems(items) {
            let subtotal = 0;
            
            const itemsHtml = '<div class="cart-items">' + items.map(function(item) {
                let quantity = parseFloat(item.quantity);
                if (isNaN(quantity)) quantity = 1;
                
                const price = parseFloat(item.price);
                const itemTotal = price * quantity;
                subtotal += itemTotal;
                const unit = item.unit === 'кг' ? 'кг' : 'шт';
                
                return `
                    <div class="cart-item" data-productid="${item.productid}">
                        <div class="cart-item-image">
                            <i class="fas fa-shopping-basket"></i>
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-title">${escapeHtml(item.title)}</div>
                            <div class="cart-item-price">${price.toFixed(2)} ₽ / ${unit}</div>
                        </div>
                        <div class="cart-item-total">${itemTotal.toFixed(2)} ₽</div>
                        <div class="cart-item-remove" onclick="removeFromCart(${item.productid})">
                            <i class="fas fa-trash"></i>
                        </div>
                    </div>
                `;
            }).join('') + '</div>';
            
            const summaryHtml = `
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Товары:</span>
                        <span>${subtotal.toFixed(2)} ₽</span>
                    </div>
                    <div class="summary-row">
                        <span>Доставка:</span>
                        <span>Бесплатно</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Итого:</span>
                        <span>${subtotal.toFixed(2)} ₽</span>
                    </div>
                    <a href="checkout.html" class="checkout-btn">
                        <i class="fas fa-credit-card"></i> Оформить заказ
                    </a>
                    <button class="clear-cart-btn" onclick="clearCart()">
                        <i class="fas fa-trash-alt"></i> Очистить корзину
                    </button>
                </div>`;
            
            document.getElementById('cart-content').innerHTML = itemsHtml + summaryHtml;
        }

        async function removeFromCart(productId) {
            if (!confirm('Удалить товар?')) return;
            
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch(`http://localhost:3000/cart/${productId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    loadCart();
                    updateCartCount();
                    showNotification('Товар удален');
                } else {
                    showNotification('Ошибка удаления', 'error');
                }
            } catch (error) {
                showNotification('Ошибка: ' + error.message, 'error');
            }
        }

        async function clearCart() {
            if (!confirm('Очистить корзину?')) return;
            
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch('http://localhost:3000/cart', {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.ok) {
                    loadCart();
                    updateCartCount();
                    showNotification('Корзина очищена');
                }
            } catch (error) {
                showNotification('Ошибка очистки', 'error');
            }
        }

        async function updateCartCount() {
    const cartCount = document.getElementById('cart-count');
    if (!cartCount) return;
    
    const token = localStorage.getItem('token');
    if (token) {
        try {
            const res = await fetch('http://localhost:3000/cart', { 
                headers: { 'Authorization': 'Bearer ' + token } 
            });
            const items = await res.json();
            // Считаем количество товаров (не сумму)
            const total = items.length;
            cartCount.textContent = total;
            localStorage.setItem('cartCount', total);
        } catch(e) { 
            cartCount.textContent = '0';
        }
    } else { 
        cartCount.textContent = '0';
    }
}
        function checkAuth() {
            const authButtons = document.getElementById('auth-buttons');
            const token = localStorage.getItem('token');
            if (token) {
                authButtons.innerHTML = `<button onclick="logout()" style="background:#e74c3c;color:white;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;">Выйти</button>`;
            } else {
                authButtons.innerHTML = `<a href="login.html" style="color:#3498db;text-decoration:none;">Войти</a>`;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('cartCount');
            window.location.href = 'index.html';
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCart();
            checkAuth();
            updateCartCount();
        });
    </script>
</body>
</html>
